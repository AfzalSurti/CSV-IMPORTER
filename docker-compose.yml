version: "3.9"

# This compose file runs the frontend and backend containers together for
# local/demo purposes. It still points at your real Neon Postgres instance
# (Neon is serverless — there's no local Postgres container to run here).
# Copy backend/.env.example to backend/.env and frontend/.env.example to
# frontend/.env.local before running `docker compose up --build`.

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
